name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      # config.py requires DATABASE_URL at import; a dummy is enough — the
      # integration tests self-skip when the database isn't reachable.
      DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check

      - name: Tests
        run: uv run pytest

      - name: Dependency audit (advisory)
        continue-on-error: true
        run: uv run --with pip-audit pip-audit
