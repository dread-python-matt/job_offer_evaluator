name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      # config.py requires DATABASE_URL at import; a dummy is enough — the
      # integration tests self-skip when the database isn't reachable.
      DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check

      - name: Type-check
        run: uv run mypy

      - name: Tests
        run: uv run pytest

      - name: Dependency audit (advisory)
        continue-on-error: true
        run: uv run --with pip-audit pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Tests
        run: npm test -- --watch=false
