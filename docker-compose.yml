services:
  db:
    image: postgres:17
    container_name: offers_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - offers_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: offers_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Reach Postgres over the compose network (not localhost) and bind all interfaces.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      HOST: 0.0.0.0
      # The demo runs with the committed dev secrets, so it must opt into development mode.
      # APP_ENV defaults to "production" (fail-closed), which would refuse to boot with them.
      # A real deployment leaves this unset (or =production) and supplies strong secrets.
      APP_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Readiness, not liveness: /health/ready runs SELECT 1 and is 503 until the DB is
      # reachable, so dependents (and `docker compose up --wait`) only see this service
      # healthy once it can actually serve traffic.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 30s
      timeout: 3s
      start_period: 20s
      retries: 3

  # One-shot demo-data loader: seeds ~50 diverse offers so the app has something to browse and
  # match against (the demo login is loaded separately by the `seed-user` service below).
  # Opt-in via a profile, so it never runs on a plain `docker compose up`. Idempotent.
  #   docker compose run --rm seed
  seed:
    build: .
    profiles: ["seed"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    command: ["uv", "run", "--no-sync", "python", "-m", "app.scripts.seed_offers"]

  # Loads ONLY the demo login — a separate step from the offers `seed` above (the two are never
  # bundled). Run it explicitly:  docker compose run --rm seed-user
  # Waits for the API to be healthy so the app-owned `users` table exists (migrations run on API
  # boot). Idempotent; never overwrites an existing account's password.
  seed-user:
    build: .
    profiles: ["seed"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      api:
        condition: service_healthy
    restart: "no"
    command: ["uv", "run", "--no-sync", "python", "-m", "app.scripts.seed_user"]

  # One-command setup: apply migrations + seed the demo offers (idempotent); add the demo login
  # with the --demo flag. Runs the same app/scripts/setup.py as the local path. Uses `entrypoint`
  # (not `command`) so extra args pass through — Compose clears the image CMD when entrypoint is set.
  #   docker compose run --rm setup           # migrations + demo offers
  #   docker compose run --rm setup --demo    # ...plus the demo login (demo@example.com / Demo1234!)
  # Waits for the API to be healthy (so migrations are already applied), making setup's own
  # migrate step a harmless no-op before it seeds.
  setup:
    build: .
    profiles: ["seed"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      api:
        condition: service_healthy
    restart: "no"
    entrypoint: ["uv", "run", "--no-sync", "python", "-m", "app.scripts.setup"]

volumes:
  offers_postgres_data: