services:
  db:
    image: postgres:17
    container_name: offers_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - offers_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: offers_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Reach Postgres over the compose network (not localhost) and bind all interfaces.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      HOST: 0.0.0.0
      # The demo runs with the committed dev secrets, so it must opt into development mode.
      # APP_ENV defaults to "production" (fail-closed), which would refuse to boot with them.
      # A real deployment leaves this unset (or =production) and supplies strong secrets.
      APP_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Readiness, not liveness: /health/ready runs SELECT 1 and is 503 until the DB is
      # reachable, so dependents (and `docker compose up --wait`) only see this service
      # healthy once it can actually serve traffic.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 30s
      timeout: 3s
      start_period: 20s
      retries: 3

  # Angular dev server for the SPA, so `docker compose up` brings up a working UI at
  # http://localhost:4200 with no local Node needed. In the browser it calls the API at
  # http://localhost:8000 (frontend/src/environments/environment.ts), which CORS_ORIGINS allows.
  frontend:
    image: node:22-slim
    working_dir: /app
    environment:
      # ng serve needs the devDependencies (@angular/build, @angular/cli); skip Playwright's
      # heavy browser download that its npm install hook would otherwise trigger.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    # Bind-mount the source but keep the container's own node_modules (anonymous volume), so the
    # host's platform-specific binaries never shadow the Linux ones installed in the container.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Install deps on first start, then serve on all interfaces so the published port is reachable.
    command: sh -c "npm install && npm start -- --host 0.0.0.0"
    ports:
      - "4200:4200"
    depends_on:
      - api
    restart: unless-stopped

  # One-shot demo-data loader: seeds ~50 diverse offers + a verified demo login, so the app has
  # something to browse/match against and you can sign in immediately.
  # Opt-in via a profile, so it never runs on a plain `docker compose up`. Idempotent.
  #   docker compose run --rm seed
  seed:
    build: .
    profiles: ["seed"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    # Wait for the API to be healthy: it only reports healthy after `alembic upgrade head`, so the
    # app-owned `users` table exists before the demo login is seeded (offers create their own
    # external tables). This also avoids racing a second alembic run against the API's migration.
    depends_on:
      api:
        condition: service_healthy
    restart: "no"
    # Seed demo offers AND a verified demo login so `docker compose run --rm seed` makes the app
    # fully usable — browse/match/salary plus immediate sign-in. Both scripts are idempotent.
    command: ["sh", "-c", "uv run python -m app.scripts.seed_offers && uv run python -m app.scripts.seed_user"]

volumes:
  offers_postgres_data: