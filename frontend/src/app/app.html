<mat-toolbar class="app-toolbar">
  <a class="brand" routerLink="/profile" aria-label="Job Offer Matcher — home">
    <span class="brand-mark" aria-hidden="true">
      <svg class="brand-svg" viewBox="0 0 24 24" fill="none">
        <circle cx="9.3" cy="12" r="5.4" stroke="currentColor" stroke-width="2" />
        <circle cx="14.7" cy="12" r="5.4" stroke="currentColor" stroke-width="2" />
        <circle cx="12" cy="12" r="1.7" fill="currentColor" />
      </svg>
    </span>
    <span class="brand-name">
      <span class="brand-name-lead">Job&nbsp;Offer</span>
      <span class="brand-name-accent">Matcher</span>
    </span>
  </a>
  @if (isAuthenticated()) {
    <span class="toolbar-spacer"></span>
    <span class="user-email">{{ currentUser()?.email }}</span>
    <button mat-button type="button" routerLink="/change-password">
      <mat-icon>lock_reset</mat-icon>
      Change password
    </button>
    <button mat-button type="button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      Sign out
    </button>
  }
</mat-toolbar>

@if (isAuthenticated()) {
  <nav mat-tab-nav-bar [tabPanel]="tabPanel" class="app-nav">
    <a
      mat-tab-link
      routerLink="/profile"
      routerLinkActive
      #profileLink="routerLinkActive"
      [active]="profileLink.isActive"
      class="nav-link"
    >
      <mat-icon>person_outline</mat-icon>
      Profile
    </a>
    <a
      mat-tab-link
      routerLink="/match-offers"
      routerLinkActive
      #matchLink="routerLinkActive"
      [active]="matchLink.isActive"
      class="nav-link"
    >
      <mat-icon>travel_explore</mat-icon>
      Match Offers
    </a>
    <a
      mat-tab-link
      routerLink="/ai-match-offers"
      routerLinkActive
      #aiMatchLink="routerLinkActive"
      [active]="aiMatchLink.isActive"
      class="nav-link"
    >
      <mat-icon>auto_awesome</mat-icon>
      AI Match
    </a>
    <a
      mat-tab-link
      routerLink="/browse-offers"
      routerLinkActive
      #browseLink="routerLinkActive"
      [active]="browseLink.isActive"
      class="nav-link"
    >
      <mat-icon>list_alt</mat-icon>
      Browse Offers
    </a>
    <a
      mat-tab-link
      routerLink="/model-usage"
      routerLinkActive
      #usageLink="routerLinkActive"
      [active]="usageLink.isActive"
      class="nav-link"
    >
      <mat-icon>monitoring</mat-icon>
      Model Usage
    </a>
  </nav>
}

<mat-tab-nav-panel #tabPanel>
  <router-outlet />
</mat-tab-nav-panel>
